version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: db/query
    gen:
      go:
        package: queries
        out: internal/repository/queries
        sql_package: pgx/v5
        emit_json_tags: false
        emit_db_tags: false
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
